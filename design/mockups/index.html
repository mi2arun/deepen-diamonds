<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepen Diamonds — Mobile UI Mockups</title>
<style>
:root{
  --brand:#1267E8; --brand-press:#0F56C4; --brand-tint:#E1ECFC;
  --ok:#16A34A; --hold:#F59E0B; --neg:#DC2626; --gold:#C7A34E;
}
[data-theme="light"]{
  --canvas:#F5F7FB; --surface:#FFFFFF; --surface-2:#FBFCFE;
  --ink:#0B1220; --muted:#5B6577; --line:#E6EAF0; --chip:#F0F3F8;
  --shadow:0 1px 2px rgba(11,18,32,.06),0 6px 20px rgba(11,18,32,.06);
  --thumb:linear-gradient(135deg,#EAF1FF,#DCE7FB);
}
[data-theme="dark"]{
  --canvas:#101827; --surface:#182338; --surface-2:#1F2C45;
  --ink:#EAF0FA; --muted:#93A0BC; --line:#2A3854; --chip:#22304C;
  --brand-tint:#1D3563;
  --shadow:0 1px 2px rgba(4,10,24,.5),0 10px 30px rgba(4,10,24,.5);
  --thumb:linear-gradient(135deg,#24365C,#182338);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  background:#232733;color:var(--ink);padding:28px 16px 60px;
  display:flex;flex-direction:column;align-items:center;gap:8px}
.pagehead{color:#cdd4e0;text-align:center;margin-bottom:12px}
.pagehead h1{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.pagehead p{font-size:13px;color:#8a93a6}
.toolbar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;justify-content:center}
.toolbar button{background:#333a48;color:#e7ebf3;border:1px solid #454e60;border-radius:999px;
  padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer}
.toolbar button.active{background:var(--brand);border-color:var(--brand);color:#fff}
.grid{display:flex;flex-wrap:wrap;gap:14px 18px;justify-content:center;align-items:flex-start}

/* each phone sits in a scaled slot so more fit on screen.
   change --scale to zoom all mockups at once (0.72 default). */
:root{--scale:.72}
.slot{display:flex;flex-direction:column;align-items:center}
/* reserved box = phone's scaled footprint; the phone is scaled inside it */
.stage{width:calc(414px * var(--scale));height:calc(868px * var(--scale));overflow:hidden}
.stage .phone{transform:scale(var(--scale));transform-origin:top left;margin:12px 0 0 12px}

/* Phone frame */
.phone{width:390px;height:844px;background:var(--canvas);border-radius:44px;
  box-shadow:0 0 0 10px #0d1017,0 0 0 12px #2a2f3a,0 18px 40px rgba(0,0,0,.5);
  overflow:hidden;position:relative;display:flex;flex-direction:column}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:30px;
  background:#0d1017;border-radius:0 0 18px 18px;z-index:50}
.status{height:52px;flex:0 0 52px;display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 24px 6px;font-size:13px;font-weight:600;color:var(--ink);z-index:40}
.caption{font-size:12px;color:#8a93a6;text-align:center;margin-top:10px;font-weight:600;letter-spacing:.02em}

/* App chrome */
.appbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  padding:6px 18px 12px;background:var(--canvas)}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:19px;letter-spacing:-.02em}
.dia{width:22px;height:22px;position:relative;display:inline-block}
.dia svg{width:100%;height:100%;display:block}
.iconbtn{width:34px;height:34px;border-radius:11px;background:var(--surface);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;color:var(--ink);box-shadow:var(--shadow)}
.iconbtn svg{width:18px;height:18px}
.body{flex:1;overflow-y:auto;padding:0 16px 100px}
.body::-webkit-scrollbar{width:0}

/* Quick filter chips row */
.qrow{display:flex;gap:8px;overflow-x:auto;padding:4px 16px 12px;background:var(--canvas)}
.qrow::-webkit-scrollbar{height:0}
.qchip{flex:0 0 auto;padding:8px 14px;border-radius:999px;background:var(--surface);border:1px solid var(--line);
  font-size:13px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:6px;box-shadow:var(--shadow)}
.qchip.on{background:var(--brand);border-color:var(--brand);color:#fff}
.qchip .b{background:rgba(255,255,255,.25);border-radius:999px;padding:0 6px;font-size:11px}

/* result count bar + view switcher */
.countbar{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 12px}
.countbar .n{font-size:13px;color:var(--muted);font-weight:600}
.countbar .right{display:flex;align-items:center;gap:10px}
.sortpill{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);
  border-radius:10px;padding:6px 11px;font-size:12.5px;font-weight:700;color:var(--ink);box-shadow:var(--shadow);
  white-space:nowrap;line-height:1}
.sortpill .ic{width:15px;height:15px;color:var(--muted);display:flex}
.sortpill .ic svg{width:15px;height:15px}
.sortpill .lbl{color:var(--ink)}
.sortpill .val{color:var(--brand);font-weight:800}
.sortpill .dir{color:var(--brand);display:flex}
.sortpill .dir svg{width:13px;height:13px}
.vswitch{display:inline-flex;background:var(--chip);border-radius:10px;padding:3px;gap:2px}
.vswitch button{width:32px;height:28px;border:none;background:transparent;border-radius:8px;color:var(--muted);
  display:flex;align-items:center;justify-content:center;cursor:pointer}
.vswitch button svg{width:16px;height:16px}
.vswitch button.on{background:var(--surface);color:var(--brand);box-shadow:0 1px 3px rgba(11,18,32,.12)}

/* ---- COMPACT CARD (small photo, one-line, denser than big card) ---- */
.ccard{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--line);
  border-radius:14px;padding:9px 12px 9px 9px;margin-bottom:9px;box-shadow:var(--shadow);position:relative}
.ccard .cthumb{flex:0 0 54px;width:54px;height:54px;border-radius:11px;position:relative;overflow:hidden;
  background:radial-gradient(120% 120% at 30% 20%,#ffffff 0%,#eef3fb 40%,#d3e0f3 100%)}
[data-theme="dark"] .ccard .cthumb{background:radial-gradient(120% 120% at 30% 20%,#2E4368 0%,#233250 50%,#1A2740 100%)}
.ccard .cthumb img{position:absolute;inset:0;margin:auto;width:50px;height:50px;object-fit:contain;
  filter:drop-shadow(0 3px 6px rgba(18,103,232,.22))}
.ccard .cthumb .pd{position:absolute;top:4px;left:4px;width:7px;height:7px;border-radius:50%;box-shadow:0 0 0 2px var(--surface)}
.ccard .cthumb .pd.ok{background:var(--ok)} .ccard .cthumb .pd.hold{background:var(--hold)}
.ccard .cmain{flex:1;min-width:0}
.ccard .cl1{display:flex;align-items:baseline;gap:6px}
.ccard .cl1 .ct{font-size:16px;font-weight:800;letter-spacing:-.02em}
.ccard .cl1 .sh{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase}
.ccard .cl1 .mk{font-size:12px;font-weight:800;color:var(--brand);margin-left:auto}
.ccard .cl2{font-size:12.5px;font-weight:800;margin-top:2px}
.ccard .cl2 .m{color:var(--muted);font-weight:600;font-size:11px}
.ccard .cprice{text-align:right;flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.ccard .cprice .t{font-size:15px;font-weight:800;letter-spacing:-.02em}
.ccard .cprice .hb{font-size:11px;font-weight:800;color:var(--brand);background:var(--brand-tint);border-radius:7px;padding:3px 10px}
[data-theme="dark"] .ccard .cprice .hb{color:#fff;background:var(--brand)}

/* ---- compact LIST row (no image) ---- */
.lrow{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);
  border-radius:12px;padding:11px 13px;margin-bottom:8px;box-shadow:var(--shadow);position:relative}
.lrow .sd{width:8px;height:8px;border-radius:50%;flex:0 0 8px}
.lrow .sd.ok{background:var(--ok)} .lrow .sd.hold{background:var(--hold)}
.lrow .lmain{flex:1;min-width:0}
.lrow .l1{font-size:14px;font-weight:800;letter-spacing:-.01em;display:flex;align-items:baseline;gap:6px}
.lrow .l1 .sh{color:var(--muted);font-size:12px;font-weight:700}
.lrow .l1 .cs{color:var(--ink)}
.lrow .l1 .mk{color:var(--brand);font-weight:800;font-size:12.5px;margin-left:2px}
.lrow .l2{font-size:11px;color:var(--muted);font-weight:600;margin-top:3px}
.lrow .lprice{text-align:right;flex:0 0 auto}
.lrow .lprice .t{font-size:15px;font-weight:800;letter-spacing:-.02em}
.lrow .lprice .d{font-size:10.5px;font-weight:800;color:var(--neg)}
.lrow .chev{color:var(--muted);flex:0 0 auto}
.lrow .chev svg{width:16px;height:16px}
/* dense header for list */
.lhead{display:flex;justify-content:space-between;padding:2px 14px 8px;font-size:10.5px;
  font-weight:800;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}

/* ---- selection mode ---- */
.chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);flex:0 0 22px;
  display:flex;align-items:center;justify-content:center;transition:.12s}
.chk svg{width:13px;height:13px;color:#fff;opacity:0}
.selrow .chk,.selcard .chk{border-color:var(--brand)}
.selrow.sel .chk,.selcard.sel .chk{background:var(--brand);border-color:var(--brand)}
.selrow.sel .chk svg,.selcard.sel .chk svg{opacity:1}
.selrow.sel,.selcard.sel{border-color:var(--brand);box-shadow:0 0 0 1.5px var(--brand),var(--shadow)}
.selcard .chk{position:absolute;top:14px;left:14px;z-index:4;background:var(--surface)}
.selcard .thumb{margin-left:2px}
/* selection top bar */
.selbar{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 12px}
.selbar .cancel{font-size:14px;font-weight:700;color:var(--muted)}
.selbar .cnt{font-size:15px;font-weight:800}
.selbar .all{font-size:13px;font-weight:700;color:var(--brand)}

/* sticky BATCH HOLD bar */
.batchbar{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--line);
  padding:13px 16px 24px;z-index:36;box-shadow:0 -6px 20px rgba(11,18,32,.1)}
.batchbar .row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.batchbar .tally{display:flex;flex-direction:column}
.batchbar .tally .a{font-size:12px;color:var(--muted);font-weight:600}
.batchbar .tally .b{font-size:18px;font-weight:800;letter-spacing:-.02em}
.batchbar .tally .b span{color:var(--brand)}
.batchbar .go{background:var(--brand);color:#fff;border:none;border-radius:13px;padding:14px 24px;
  font-size:15px;font-weight:800;box-shadow:0 6px 18px rgba(18,103,232,.32);display:flex;align-items:center;gap:8px}
.batchbar .go svg{width:16px;height:16px}

/* Diamond card */
.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:12px 12px 0;
  margin-bottom:14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.card .top{display:flex;gap:13px}
/* photo thumbnail — designed for real diamond photography */
.thumb{flex:0 0 88px;width:88px;height:88px;border-radius:14px;position:relative;overflow:hidden;
  background:radial-gradient(120% 120% at 30% 20%,#ffffff 0%,#eef3fb 38%,#d9e4f5 70%,#c3d3ec 100%)}
[data-theme="dark"] .thumb{background:radial-gradient(120% 120% at 30% 20%,#2E4368 0%,#233250 45%,#1A2740 100%)}
/* real diamond photo */
.thumb .stone{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.thumb .stone img{width:82px;height:82px;object-fit:contain;filter:drop-shadow(0 5px 9px rgba(18,103,232,.22))}
.thumb .sheen{position:absolute;top:-30%;left:-10%;width:55%;height:160%;transform:rotate(20deg);pointer-events:none;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent)}
[data-theme="dark"] .thumb .sheen{background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent)}
.thumb .play{position:absolute;bottom:6px;right:6px;width:24px;height:24px;border-radius:8px;
  background:rgba(11,18,32,.6);backdrop-filter:blur(4px);color:#fff;display:flex;align-items:center;justify-content:center}
.thumb .play svg{width:12px;height:12px}
/* availability tag on the info side, top-right */
.stag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;letter-spacing:.02em;
  padding:3px 9px 3px 7px;border-radius:999px}
.stag .d{width:7px;height:7px;border-radius:50%}
.stag.ok{background:rgba(22,163,74,.12);color:var(--ok)} .stag.ok .d{background:var(--ok)}
.stag.hold{background:rgba(245,158,11,.14);color:#B4770B} .stag.hold .d{background:var(--hold)}
[data-theme="dark"] .stag.hold{color:var(--hold)}

.info{flex:1;min-width:0;display:flex;flex-direction:column}
.headrow{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
/* line 1: carat + shape = the hero */
.title{display:flex;align-items:baseline;gap:7px;line-height:1}
.title .ct{font-size:22px;font-weight:800;letter-spacing:-.03em}
.title .sh{font-size:15px;font-weight:700;color:var(--muted);letter-spacing:.02em;text-transform:uppercase}
/* line 2: 4C summary, the key specs, bold and readable */
.summary{margin-top:9px;font-size:14px;font-weight:800;letter-spacing:.01em;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.summary .sep{color:var(--line);font-weight:400}
.summary .grade{color:var(--brand)}
/* line 3: cert / lab / location — quiet meta */
.certln{font-size:11.5px;color:var(--muted);margin-top:7px;font-weight:600;letter-spacing:.02em;
  display:flex;align-items:center;gap:6px}
.certln .lab{font-weight:800;color:var(--ink);background:var(--chip);border-radius:5px;padding:1px 6px;font-size:10.5px}
/* footer: divider + price anchor + hold */
.foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;
  border-top:1px solid var(--line);padding:11px 0 12px}
.price{display:flex;align-items:baseline;gap:9px}
.total{font-size:20px;font-weight:800;letter-spacing:-.02em}
.ppc{font-size:11px;color:var(--muted);font-weight:600}
.disc{font-size:11.5px;font-weight:800;color:var(--neg);background:rgba(220,38,38,.1);border-radius:7px;padding:3px 8px}
.holdbtn{background:var(--brand);color:#fff;border:none;border-radius:11px;padding:10px 20px;
  font-size:13.5px;font-weight:800;box-shadow:0 4px 12px rgba(18,103,232,.3)}
.holdbtn.held{background:transparent;color:var(--hold);border:1.5px solid var(--hold);box-shadow:none;padding:8.5px 18px}
.holdbtn.held::before{content:'✓ '}

/* bottom nav */
.nav{position:absolute;bottom:0;left:0;right:0;height:78px;background:var(--surface);
  border-top:1px solid var(--line);display:flex;justify-content:space-around;align-items:flex-start;
  padding-top:11px;z-index:30}
.nav a{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);font-size:11px;font-weight:600;text-decoration:none}
.nav a svg{width:23px;height:23px}
.nav a.on{color:var(--brand)}
.nav .badge{position:relative}
.nav .badge::after{content:'2';position:absolute;top:-4px;right:-8px;background:var(--neg);color:#fff;
  font-size:9px;font-weight:800;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* fab filter */
.fab{position:absolute;bottom:94px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--canvas);
  border:none;border-radius:999px;padding:12px 22px;font-size:14px;font-weight:800;display:flex;align-items:center;gap:8px;
  box-shadow:0 8px 24px rgba(0,0,0,.35);z-index:35}
.fab svg{width:17px;height:17px}
.fab .cnt{background:var(--brand);color:#fff;border-radius:999px;padding:1px 7px;font-size:11px}

/* ================= HOME / LANDING ================= */
.greet{padding:2px 2px 12px}
.greet .hi{font-size:13px;color:var(--muted);font-weight:600}
.greet .nm{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-top:2px}
.searchbar{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);
  border-radius:14px;padding:13px 15px;box-shadow:var(--shadow);color:var(--muted);font-size:14px;font-weight:600}
.searchbar svg{width:18px;height:18px;flex:0 0 18px}
.searchbar .k{margin-left:auto;background:var(--chip);border-radius:8px;padding:5px 9px;color:var(--brand);font-size:12px;font-weight:800}
.qshort{display:flex;gap:8px;overflow-x:auto;margin:12px 0 4px;padding-bottom:2px}
.qshort::-webkit-scrollbar{height:0}
.qshort .s{flex:0 0 auto;background:var(--surface);border:1px solid var(--line);border-radius:999px;
  padding:8px 14px;font-size:12.5px;font-weight:700;color:var(--ink);box-shadow:var(--shadow)}
.qshort .s.b{background:var(--brand-tint);border-color:transparent;color:var(--brand)}
[data-theme="dark"] .qshort .s.b{color:#fff}

.sectitle{display:flex;align-items:baseline;justify-content:space-between;margin:22px 2px 12px}
.sectitle h3{font-size:17px;font-weight:800;letter-spacing:-.02em}
.sectitle a{font-size:13px;font-weight:700;color:var(--brand);text-decoration:none}

/* announcement hero banner */
.banner{border-radius:18px;padding:20px;position:relative;overflow:hidden;color:#fff;
  background:linear-gradient(120deg,var(--brand) 0%,#0F56C4 55%,#0B3A8F 100%);box-shadow:0 8px 22px rgba(18,103,232,.32)}
.banner .tag{font-size:11px;font-weight:800;letter-spacing:.08em;opacity:.85;text-transform:uppercase}
.banner h2{font-size:21px;font-weight:800;letter-spacing:-.02em;margin:8px 0 6px;line-height:1.2}
.banner p{font-size:13px;opacity:.9;line-height:1.4;max-width:78%}
.banner .cta{display:inline-flex;align-items:center;gap:6px;margin-top:14px;background:#fff;color:var(--brand);
  border-radius:10px;padding:9px 16px;font-size:13px;font-weight:800}
.banner .cta svg{width:14px;height:14px}
.banner .ghost{position:absolute;right:-30px;bottom:-40px;width:180px;height:180px;opacity:.16}
.banner .dots{position:absolute;bottom:14px;right:16px;display:flex;gap:5px}
.banner .dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4)}
.banner .dots i.on{background:#fff;width:16px;border-radius:3px}

/* new arrivals carousel */
.carousel{display:flex;gap:12px;overflow-x:auto;padding:2px 2px 6px;margin:0 -16px;padding-left:16px;padding-right:16px}
.carousel::-webkit-scrollbar{height:0}
.acard{flex:0 0 148px;width:148px;background:var(--surface);border:1px solid var(--line);border-radius:16px;
  padding:10px;box-shadow:var(--shadow);position:relative}
.acard .apic{height:110px;border-radius:12px;position:relative;overflow:hidden;
  background:radial-gradient(120% 120% at 30% 20%,#ffffff 0%,#eef3fb 40%,#d3e0f3 100%)}
[data-theme="dark"] .acard .apic{background:radial-gradient(120% 120% at 30% 20%,#2E4368 0%,#233250 50%,#1A2740 100%)}
.acard .apic img{position:absolute;inset:0;margin:auto;width:96px;height:96px;object-fit:contain;filter:drop-shadow(0 5px 9px rgba(18,103,232,.24))}
.acard .newtag{position:absolute;top:8px;left:8px;background:var(--brand);color:#fff;font-size:9.5px;font-weight:800;
  letter-spacing:.04em;padding:3px 8px;border-radius:999px;z-index:2}
.acard .at{font-size:15px;font-weight:800;letter-spacing:-.02em;margin-top:9px}
.acard .as{font-size:12px;font-weight:700;color:var(--muted);margin-top:2px}
.acard .ap{font-size:14px;font-weight:800;color:var(--brand);margin-top:6px}

/* market news */
.news{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 14px;
  margin-bottom:10px;box-shadow:var(--shadow);display:flex;gap:12px;align-items:flex-start}
.news .ico{flex:0 0 40px;width:40px;height:40px;border-radius:11px;background:var(--brand-tint);color:var(--brand);
  display:flex;align-items:center;justify-content:center}
[data-theme="dark"] .news .ico{background:#1D3563;color:#7FB0FF}
.news .ico svg{width:19px;height:19px}
.news .nbody{flex:1;min-width:0}
.news .nt{font-size:14px;font-weight:800;letter-spacing:-.01em;line-height:1.3}
.news .nx{font-size:12px;color:var(--muted);font-weight:600;margin-top:4px;line-height:1.4}
.news .nm{font-size:11px;color:var(--muted);font-weight:700;margin-top:6px;display:flex;align-items:center;gap:8px}
.news .up{color:var(--ok);font-weight:800} .news .down{color:var(--neg);font-weight:800}

/* events */
.event{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px;
  margin-bottom:10px;box-shadow:var(--shadow);display:flex;gap:13px;align-items:center}
.event .date{flex:0 0 54px;width:54px;height:60px;border-radius:12px;background:var(--brand-tint);

/* ---- Filter sheet ---- */
.sheet{position:absolute;inset:0;background:rgba(11,18,32,.5);z-index:60;display:flex;align-items:flex-end}

</head>

function statusbar(){return `<div class="status"><span>9:41</span><span>&#128246; &#128268; 95%</span></div>`;}

function nav(active){
  const items=[['home','Home',HOMEI],['search','Search',SEARCH],['holds','My Holds',HEART],['me','Account',USER]];
  return `<div class="nav">`+items.map(([k,l,ic])=>`
    <a class="${active===k?'on':''} ${k==='holds'?'badge':''}">${ic}<span>${l}</span></a>`).join('')+`</div>`;
}

// compress the three make grades: EX EX EX -> 3EX, EX EX VG -> shows individually
function makeBadge(cut,pol,sym){
  if(cut===pol && pol===sym) return `3${cut}`;
  return `${cut} ${pol} ${sym}`;
}
// diamond card — hierarchy: carat+shape hero, bold 4C summary, quiet cert, divided price footer
function card(d){
  return `<div class="card">
    <div class="top">
      <div class="thumb">
        <div class="stone"><img src="${DIAMOND_IMG}" alt="diamond"></div>
        <div class="sheen"></div>
        <div class="play">${CAM}</div>
      </div>
      <div class="info">
        <div class="headrow">
          <div class="title"><span class="ct">${d.ct}</span><span class="sh">${d.shape}</span></div>
          <span class="stag ${d.held?'hold':'ok'}"><span class="d"></span>${d.held?'HELD':'AVAIL'}</span>
        </div>
        <div class="summary">
          <span>${d.col}</span><span class="sep">·</span>
          <span>${d.cl}</span><span class="sep">·</span>
          <span class="grade">${makeBadge(d.cut,d.pol,d.sym)}</span>
        </div>
        <div class="certln"><span class="lab">${d.lab}</span>${d.cert} · ${d.loc}</div>
      </div>
    </div>
    <div class="foot">
      <div class="price">
        <span class="total">$${d.total}</span>
        <span class="ppc">$${d.ppc}/ct</span>
        <span class="disc">${d.disc}</span>
      </div>
      <button class="holdbtn ${d.held?'held':''}">${d.held?'Held':'Hold'}</button>
    </div>
  </div>`;
}

// compact card — small photo + one-line specs, denser than the big card
function ccard(d){
  return `<div class="ccard">
    <div class="cthumb"><span class="pd ${d.held?'hold':'ok'}"></span><img src="${DIAMOND_IMG}" alt=""></div>
    <div class="cmain">
      <div class="cl1"><span class="ct">${d.ct}</span><span class="sh">${d.shape}</span>
        <span class="mk">${makeBadge(d.cut,d.pol,d.sym)}</span></div>
      <div class="cl2">${d.col} · ${d.cl} <span class="m">· ${d.lab} · ${d.loc}</span></div>
    </div>
    <div class="cprice"><span class="t">$${d.total}</span>
      <span class="hb">${d.held?'Held':'Hold'}</span></div>
  </div>`;
}

// compact list row (no image) — trade-standard columns
function lrow(d,opts={}){
  const sel=opts.select?`selrow ${d.checked?'sel':''}`:'';
  const lead=opts.select
    ? `<div class="chk">${CHECK}</div>`
    : `<span class="sd ${d.held?'hold':'ok'}"></span>`;
  return `<div class="lrow ${sel}">
    ${lead}
    <div class="lmain">
      <div class="l1"><span class="sh">${d.shape.slice(0,3)}</span>
        <span class="cs">${d.ct}</span>
        <span class="cs">${d.col} ${d.cl}</span>
        <span class="mk">${makeBadge(d.cut,d.pol,d.sym)}</span></div>
      <div class="l2">${d.lab} · ${d.cert.slice(0,7)} · ${d.loc} · $${d.ppc}/ct</div>
    </div>
    <div class="lprice"><div class="t">$${d.total}</div><div class="d">${d.disc}</div></div>
    ${opts.select?'':`<span class="chev">${CHEV}</span>`}
  </div>`;
}

function loginScreen(){
  return phone('Login · Phone OTP', statusbar()+`
    <div class="login">
      <div class="hero">
        <div class="biglogo">
          <span class="mark dia">${DIAMOND}</span>
          <div class="wm">deep<span>en</span></div>
        </div>
        <div class="tag">Curated diamond inventory.<br>Sign in to browse & hold stones.</div>
      </div>
      <div class="formcard">
        <span class="lbl">MOBILE NUMBER</span>
        <div class="phonein">
          <div class="cc">+91</div>
          <div class="ti">98xxx xxxxx</div>
        </div>
        <button class="cta">Send OTP</button>
        <div class="fineprint">Invite-only access. New buyer?<br><b style="color:var(--brand)">Request access &rarr;</b></div>
      </div>
    </div>`);
}

function sortpill(){
  const ARROWDN=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M12 5v14M6 13l6 6 6-6"/></svg>`;
  return `<div class="sortpill">
    <span class="ic">${SORT}</span>
    <span class="val">Price</span>
    <span class="dir">${ARROWDN}</span>
  </div>`;
}
function vswitch(active){
  return `<div class="vswitch">
    <button class="${active==='card'?'on':''}" title="Card">${GRID}</button>
    <button class="${active==='ccard'?'on':''}" title="Compact card">${CCARD}</button>
    <button class="${active==='list'?'on':''}" title="List">${ROWS}</button>
    <button class="${active==='compare'?'on':''}" title="Select">${LAYERS}</button>
  </div>`;
}
function qrow(){
  const q=[['Shape','2'],['Color','D–G'],['Clarity','VVS+'],['Carat','0.3–1.5'],['Location','']];
  return `<div class="qrow">${q.map(([l,b],i)=>`<div class="qchip ${i<4?'on':''}">${l}${b?`<span class="b">${b}</span>`:''}</div>`).join('')}</div>`;
}

// ---------- SCREEN 2a: CARD VIEW (hero) ----------
function cardScreen(){
  return phone('① Card view — visual browse', statusbar()+appbar()+qrow()+`
    <div class="body">
      <div class="countbar"><span class="n">632 diamonds</span>
        <div class="right">${sortpill()}${vswitch('card')}</div></div>
      ${stones.map(card).join('')}
    </div>
    <button class="fab">${SLIDERS}Filters<span class="cnt">4</span></button>
    ${nav('search')}`);
}

// ---------- SCREEN 2a2: COMPACT CARD VIEW (small photo, medium density) ----------
function ccardScreen(){
  const list=stones.concat(stones.slice(0,3));
  return phone('①½ Compact card — small photo', statusbar()+appbar()+qrow()+`
    <div class="body">
      <div class="countbar"><span class="n">632 diamonds</span>
        <div class="right">${sortpill()}${vswitch('ccard')}</div></div>
      ${list.map(ccard).join('')}
    </div>
    <button class="fab">${SLIDERS}Filters<span class="cnt">4</span></button>
    ${nav('search')}`);
}

// ---------- SCREEN 2b: LIST VIEW (no image, dense) ----------
function compactScreen(){
  return phone('② List view — dense, no image', statusbar()+appbar()+qrow()+`
    <div class="body">
      <div class="countbar"><span class="n">632 diamonds</span>
        <div class="right">${sortpill()}${vswitch('list')}</div></div>
      ${stones.concat(stones.slice(0,4)).map(d=>lrow(d)).join('')}
    </div>
    <button class="fab">${SLIDERS}Filters<span class="cnt">4</span></button>
    ${nav('search')}`);
}

// ---------- SCREEN 2c: COMPARE / SELECT mode + batch hold ----------
function selectScreen(){
  const list=stones.concat(stones.slice(0,3));
  const checked=[0,2,3];  // pre-selected for the mockup
  const rows=list.map((d,i)=>lrow({...d,checked:checked.includes(i)},{select:true})).join('');
  return phone('③ Select mode — batch hold ★', statusbar()+`
    <div class="appbar" style="padding-top:14px">
      <div class="selbar" style="width:100%;padding:0">
        <span class="cancel">Cancel</span>
        <span class="cnt">4 selected</span>
        <span class="all">Select all</span>
      </div>
    </div>
    <div class="body" style="padding-bottom:130px">
      ${rows}
    </div>
    <div class="batchbar">
      <div class="row">
        <div class="tally">
          <span class="a">4 stones · 1.81 ct total</span>
          <span class="b">$<span>1,341</span>.60</span>
        </div>
        <button class="go">${LOCK}Hold all 4</button>
      </div>
    </div>`);
}

// ---------- SCREEN 3: FILTER SHEET ----------
function filterScreen(){
  const shapes=['Round','Pear','Princess','Marquise','Oval','Radiant','Emerald','Heart','Cushion'];
  const colors=['D','E','F','G','H','I','J','K'];
  const clarity=['FL','IF','VVS1','VVS2','VS1','VS2','SI1','SI2'];
  const grade=['EX','VG','GD','FR'];
  const on=(arr)=>arr;
  function grp(lbl,items,onset,sel){return `<div class="fgroup">
    <div class="glbl">${lbl}${sel?`<span class="sel">${sel}</span>`:''}</div>
    <div class="chips">${items.map(x=>`<span class="fchip ${onset.includes(x)?'on':''}">${x}</span>`).join('')}</div></div>`;}
  return phone('Filter — bottom sheet', statusbar()+appbar()+`
    <div class="qrow">${['Shape','Color','Clarity','Carat'].map(l=>`<div class="qchip on">${l}</div>`).join('')}</div>
    <div class="body">${stones.slice(0,3).map(card).join('')}</div>
    ${nav('search')}
    <div class="sheet">
      <div class="sheetcard">
        <div class="grip"></div>
        <div class="sheethead"><h3>Filters</h3><span class="clear">Reset all</span></div>
        ${grp('Shape',shapes,['Round','Oval'],'2 selected')}
        ${grp('Color',colors,['D','E','F','G'],'D–G')}
        ${grp('Clarity',clarity,['VVS1','VVS2','VS1'],'VVS1–VS1')}
        <div class="fgroup"><div class="glbl">Carat <span class="sel">0.30 – 1.50 ct</span></div>
          <div class="slider"><div class="fill"></div><div class="kn" style="left:18%"></div><div class="kn" style="left:70%"></div></div>
          <div class="range"><div class="in">0.30</div><span style="color:var(--muted)">to</span><div class="in">1.50</div></div>
        </div>
        ${grp('Cut',grade,['EX','VG'],'')}
        ${grp('Polish',grade,['EX'],'')}
        ${grp('Symmetry',grade,['EX'],'')}
        ${grp('Fluorescence',['None','Faint','Medium','Strong'],['None','Faint'],'')}
        ${grp('Location',['India','HK'],['India'],'')}
        <div class="applybar"><button class="applybtn">Show 632 diamonds</button></div>
      </div>
    </div>`);
}

// ---------- SCREEN 4: DETAIL ----------
function detailScreen(){
  const rows=[['Shape','Round Brilliant'],['Carat','0.30 ct'],['Color','D'],['Clarity','VVS1'],
    ['Cut','Excellent'],['Polish','Excellent'],['Symmetry','Very Good'],['Fluorescence','Medium'],
    ['Measurements','4.30 × 4.32 × 2.68'],['Table','58%'],['Depth','62.1%'],['H&A','Excellent'],
    ['Lab','GIA'],['Cert No','5551700096'],['Location','India']];
  return phone('Stone detail', statusbar()+`
    <div class="body" style="padding-top:0">
      <div class="hero-media">
        <div class="backbtn">${BACK}</div>
        <img src="${DIAMOND_IMG}" alt="diamond" style="width:210px;height:210px;object-fit:contain;filter:drop-shadow(0 14px 28px rgba(18,103,232,.28))">
        <div class="pill"><span class="mtab on">${IMG}Photo</span><span class="mtab">${CAM}Video</span><span class="mtab">Cert</span></div>
      </div>
      <div class="dtitle"><h2>Round</h2><span class="c">0.30ct</span></div>
      <div class="dsub">D · VVS1 · GIA Certified · India</div>
      <div class="spectable">
        ${rows.map(([k,v])=>`<div class="srow"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('')}
      </div>
      <div class="pricebox">
        <div><div class="lo">Rap $2,200 · <b style="color:var(--neg)">-62%</b> · $836/ct</div><div class="hi">$250.80</div></div>
        <div style="text-align:right"><div class="lo">Total amount</div><div class="lo" style="font-weight:800;color:var(--brand)">Available</div></div>
      </div>
      <div style="height:90px"></div>
    </div>
    <div class="dockbar">
      <button class="hold">Hold this diamond</button>
      <button class="sec">${SHARE}</button>
    </div>`);
}

// ---------- SCREEN 5: MY HOLDS ----------
function holdsScreen(){
  const held=[{...stones[1],held:true},{...stones[3],held:true}];
  return phone('My Holds', statusbar()+appbar()+`
    <div class="body">
      <div class="sechead">2 stones on hold</div>
      ${held.map(d=>card({...d,held:true})).join('')}
      <div class="sechead" style="margin-top:20px">What happens next?</div>
      <div class="card" style="display:block">
        <p style="font-size:13.5px;line-height:1.6;color:var(--muted)">
          Our team has been notified of your hold. We'll reach out on
          <b style="color:var(--ink)">WhatsApp</b> to confirm availability and arrange the rest.
          Holds are kept for <b style="color:var(--ink)">24 hours</b>.
        </p>
      </div>
    </div>
    ${nav('holds')}`);
}

function phone(caption, inner){
  return `<div class="slot">
    <div class="stage"><div class="phone"><div class="notch"></div>${inner}</div></div>
    <div class="caption">${caption}</div>
  </div>`;
}

function render(){
  document.getElementById('grid').innerHTML =
    loginScreen()+homeScreen()
    +cardScreen()+ccardScreen()+compactScreen()+selectScreen()
    +filterScreen()+detailScreen()+holdsScreen();
}
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('tLight').classList.toggle('active',t==='light');
  document.getElementById('tDark').classList.toggle('active',t==='dark');
}
function setScale(s){
  document.documentElement.style.setProperty('--scale',s);
  document.querySelectorAll('.toolbar button').forEach(b=>{
    if(['S','M','L','100%'].includes(b.textContent)) b.classList.toggle('active',
      (b.textContent==='S'&&s===.55)||(b.textContent==='M'&&s===.72)||
      (b.textContent==='L'&&s===.9)||(b.textContent==='100%'&&s===1));
  });
}
render();
</script>
</body>
</html>
